<!-- Simple SVG Icon for SafeSense Kids Guardian -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="url(#grad)" />
  
  <!-- Shield Shape -->
  <path d="M 64 20 L 90 30 L 90 60 Q 90 90 64 105 Q 38 90 38 60 L 38 30 Z" 
        fill="white" opacity="0.95" />
  
  <!-- Shield Icon (Check Mark) -->
  <path d="M 52 64 L 60 72 L 76 48" 
        stroke="#667eea" stroke-width="6" fill="none" 
        stroke-linecap="round" stroke-linejoin="round" />
</svg>
